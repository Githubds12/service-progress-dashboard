<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ BUG BOUNTY | Intelligence Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg: #030508;
            --card: rgba(13, 17, 23, 0.7);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.2);
            --red: #ff5252;
            --red-glow: rgba(255, 82, 82, 0.3);
            --yellow: #ffd700;
            --green: #00e676;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --glass-bg: rgba(10, 10, 10, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- GLOBAL LAYOUT --- */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 30px; }
        
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .logo { font-size: 14px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 3px; opacity: 0.8; }

        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
            background: var(--glass-bg); backdrop-filter: blur(30px);
            border-right: 1px solid var(--border); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; padding: 30px 0;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .sidebar:hover { width: 260px; }
        .sidebar-item {
            width: 100%; padding: 18px 30px; display: flex; align-items: center; gap: 25px;
            color: var(--text-dim); cursor: pointer; transition: 0.3s; white-space: nowrap;
            text-decoration: none;
        }
        .sidebar-item i { font-size: 22px; min-width: 30px; }
        .sidebar-item span { opacity: 0; font-weight: 700; font-size: 13px; text-transform: uppercase; }
        .sidebar:hover .sidebar-item span { opacity: 1; }
        .sidebar-item:hover, .sidebar-item.active { color: var(--accent); background: rgba(0, 242, 255, 0.08); }

        .main-content { margin-left: 80px; transition: 0.3s; }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* --- STEALTH AI MODE --- */
        body.ai-mode { overflow: hidden; }
        body.ai-mode .sidebar, 
        body.ai-mode header { display: none !important; }
        body.ai-mode .main-content { margin-left: 0 !important; padding: 0 !important; }
        body.ai-mode .container { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }

        .ai-workspace {
            height: 100vh;
            width: 100vw;
            display: flex;
            background: #030508;
            overflow: hidden;
        }

        .ai-sidebar {
            width: 300px;
            background: #0b0e14;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 25px;
            flex-shrink: 0;
        }
        .ai-sidebar.collapsed { display: none; }

        .ai-main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #030508;
            min-width: 0;
        }

        .chat-header {
            padding: 12px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #030508;
        }

        .ai-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .ai-bubble {
            padding: 15px 22px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.5;
        }
        .ai-bubble.user { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 600; }
        .ai-bubble.bot { background: rgba(255,255,255,0.04); color: #f0f0f0; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        .ai-input-area {
            padding: 20px 25px 30px;
            border-top: 1px solid var(--border);
            background: #030508;
            display: flex;
            gap: 15px;
        }
        .ai-input-area input {
            flex: 1;
            background: #0b0e14;
            border: 1px solid var(--border);
            color: #fff;
            padding: 15px 25px;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
        }
        .ai-input-area button {
            background: var(--accent);
            border: none;
            padding: 0 30px;
            border-radius: 12px;
            cursor: pointer;
            color: #000;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
        }

        /* --- UI COMPONENTS --- */
        .ui-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: #fff; padding: 8px 15px; border-radius: 8px;
            cursor: pointer; font-size: 10px; font-weight: 700;
            display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .ui-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }

        .new-session-btn {
            background: rgba(0,242,255,0.1); border: 1px dashed var(--accent);
            color: var(--accent); padding: 12px; border-radius: 10px;
            cursor: pointer; width: 100%; margin-bottom: 20px;
            font-weight: 700; font-size: 10px; letter-spacing: 1px;
        }

        .session-item {
            padding: 10px 12px; border-radius: 8px; cursor: pointer;
            color: var(--text-dim); font-size: 12px; margin-bottom: 5px;
        }
        .session-item.active { background: rgba(0,242,255,0.1); color: var(--accent); }

        #exitAi { display: none; }

        /* --- TABLES --- */
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 25px; }
        .stat-value { font-size: 32px; font-weight: 700; color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--text-dim); font-size: 11px; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo" style="margin-bottom: 40px; font-size: 18px;"><i>BB</i></div>
        <div class="sidebar-item active" id="btn-recon" onclick="switchSection('recon', this)">
            <i class='bx bx-target-lock'></i><span>RECON</span>
        </div>
        <div class="sidebar-item" id="btn-ai" onclick="switchSection('ai', this)">
            <i class='bx bx-brain'></i><span>AI ANALYST</span>
        </div>
        <a href="apkhunter.html" class="sidebar-item">
            <i class='bx bx-mobile-alt'></i><span>APK HUNTER</span>
        </a>
    </div>

    <div class="main-content">
        <div class="container">
            <header>
                <div class="logo"><i>BUG</i> BOUNTY PORTAL</div>
                <div id="syncStatus" style="font-size: 12px; font-weight: 700; color: var(--green);">SYSTEM ONLINE</div>
            </header>

            <div id="section-recon" class="content-section active">
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;" id="statsGrid"></div>
                <div style="background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px;">
                    <h2 id="panelTitle">Intelligence Briefing</h2>
                    <table id="reconTable">
                        <thead><tr><th>Priority</th><th>Target</th><th>Finding</th></tr></thead>
                        <tbody id="reconBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-ai" class="content-section">
                <div class="ai-workspace">
                    <div class="ai-sidebar" id="aiSidebar">
                        <button class="new-session-btn" onclick="window.createNewAiSession()">+ NEW SESSION</button>
                        <div id="sessionList"></div>
                    </div>
                    <div class="ai-main-chat">
                        <div class="chat-header">
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <button class="ui-btn" onclick="window.toggleAiSidebar()">
                                    <i class='bx bx-menu-alt-left'></i> PANEL
                                </button>
                                <h2 id="currentSessionTitle" style="font-size: 14px; color: #fff;">Research Console</h2>
                                <button class="ui-btn" onclick="window.renameCurrentSession()">
                                    <i class='bx bx-edit-alt'></i> RENAME
                                </button>
                            </div>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <button class="ui-btn" onclick="window.clearSession()" style="color: var(--red);">CLEAR</button>
                                <button class="ui-btn" onclick="window.switchSection('recon')" style="background: var(--accent); color: #000; border: none;">
                                    <i class='bx bx-exit'></i> EXIT
                                </button>
                            </div>
                        </div>
                        <div id="aiMessages" class="ai-messages"></div>
                        <div class="ai-input-area">
                            <input type="text" id="aiInput" onkeypress="if(event.key === 'Enter') window.sendAiMessage()" placeholder="Request intelligence analysis...">
                            <button onclick="window.sendAiMessage()">Analyze</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="bugbounty_data.js"></script>
    <script>
        const $ = id => document.getElementById(id);
        window.state = {
            aiSessions: JSON.parse(localStorage.getItem('ai_sessions') || '[]'),
            currentSessionId: localStorage.getItem('current_session_id') || null,
            sidebarCollapsed: false
        };

        function init() {
            const data = window.bugBountyData;
            if (data) {
                $('statsGrid').innerHTML = `
                    <div class="stat-card"><div class="stat-value">${data.targets[0].stats.total}</div><div>SUBDOMAINS</div></div>
                    <div class="stat-card"><div class="stat-value" style="color: var(--accent);">${data.targets[0].stats.high_value_count}</div><div>HIGH VALUE</div></div>
                    <div class="stat-card"><div class="stat-value" style="color: var(--red);">${data.targets[0].findings.length}</div><div>FINDINGS</div></div>
                `;
                $('reconBody').innerHTML = data.targets[0].findings.map(f => `<tr><td>${f.priority}</td><td>${f.target}</td><td>${f.category}</td></tr>`).join('');
            }
            if (!window.state.aiSessions.length) window.createNewAiSession();
            else renderSessionList();
            if (window.state.currentSessionId) window.loadSession(window.state.currentSessionId);
        }

        window.toggleAiSidebar = () => {
            window.state.sidebarCollapsed = !window.state.sidebarCollapsed;
            $('aiSidebar').classList.toggle('collapsed', window.state.sidebarCollapsed);
        };

        window.switchSection = (id, el) => {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            if (el) el.classList.add('active');
            else if ($('btn-'+id)) $('btn-'+id).classList.add('active');

            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            $('section-' + id).classList.add('active');

            if (id === 'ai') document.body.classList.add('ai-mode');
            else document.body.classList.remove('ai-mode');
        };

        window.createNewAiSession = () => {
            const id = 's_' + Date.now();
            window.state.aiSessions.unshift({ id, title: 'New Analysis', messages: [{ sender: 'bot', text: 'Welcome back Specialist.' }] });
            save(); renderSessionList(); window.loadSession(id);
        };

        window.renameCurrentSession = () => {
            const s = window.state.aiSessions.find(x => x.id === window.state.currentSessionId);
            const newTitle = prompt("Enter new session title:", s.title);
            if (newTitle) {
                s.title = newTitle;
                save(); renderSessionList();
                $('currentSessionTitle').innerText = newTitle;
            }
        };

        window.loadSession = (id) => {
            window.state.currentSessionId = id; localStorage.setItem('current_session_id', id);
            const s = window.state.aiSessions.find(x => x.id === id);
            if (!s) return;
            $('currentSessionTitle').innerText = s.title;
            renderMessages();
            renderSessionList();
        };

        window.sendAiMessage = async () => {
            const i = $('aiInput'); const msg = i.value.trim(); if (!msg) return;
            const s = window.state.aiSessions.find(x => x.id === window.state.currentSessionId);
            i.value = ''; s.messages.push({ sender: 'user', text: msg });
            renderMessages();
            
            try {
                const res = await fetch("https://service-progress-portal.onrender.com/api/agent/chat", {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const d = await res.json();
                const botMsg = d.candidates[0].content.parts[0].text;
                s.messages.push({ sender: 'bot', text: botMsg });
                save(); renderMessages();
            } catch (e) { 
                s.messages.push({ sender: 'bot', text: "Error connecting to Intelligence Feed." });
                renderMessages();
            }
        };

        function renderMessages() {
            const s = window.state.aiSessions.find(x => x.id === window.state.currentSessionId);
            $('aiMessages').innerHTML = s.messages.map(m => `<div class="ai-bubble ${m.sender}">${m.text.replace(/\n/g, '<br>')}</div>`).join('');
            $('aiMessages').scrollTop = $('aiMessages').scrollHeight;
        }

        function renderSessionList() {
            $('sessionList').innerHTML = window.state.aiSessions.map(s => `
                <div class="session-item ${s.id === window.state.currentSessionId ? 'active' : ''}" onclick="loadSession('${s.id}')">
                    ${s.title}
                </div>
            `).join('');
        }

        function save() { localStorage.setItem('ai_sessions', JSON.stringify(window.state.aiSessions)); }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

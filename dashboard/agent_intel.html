<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGENT INTEL | CyberCore Analyst</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020408;
            --sidebar-bg: #05080f;
            --accent-cyan: #00f2ff;
            --accent-purple: #7000ff;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --glass: rgba(10, 15, 25, 0.7);
            --border: rgba(0, 242, 255, 0.1);
            --user-msg: rgba(112, 0, 255, 0.1);
            --agent-msg: rgba(0, 242, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar - Chat History */
        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .new-chat-btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: transparent;
            border: 1px dashed var(--accent-cyan);
            color: var(--accent-cyan);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            transition: 0.3s;
        }

        .new-chat-btn:hover {
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .history-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-dim);
            transition: 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.03);
            color: var(--text-main);
        }

        .history-item.active {
            background: var(--agent-msg);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 0%, rgba(0, 242, 255, 0.03) 0%, transparent 50%);
            position: relative;
        }

        .chat-header {
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .agent-status {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff00;
        }

        .agent-name { font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 1px; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .message {
            max-width: 85%;
            padding: 20px;
            border-radius: 16px;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg);
            border: 1px solid rgba(112, 0, 255, 0.2);
            border-bottom-right-radius: 4px;
        }

        .message.agent {
            align-self: flex-start;
            background: var(--agent-msg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message code {
            font-family: 'Fira Code', monospace;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            color: var(--accent-cyan);
        }

        .message pre {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        /* Input Area */
        .input-container {
            padding: 30px 40px;
            background: var(--sidebar-bg);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            display: flex;
            gap: 15px;
        }

        textarea {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 20px;
            color: #fff;
            font-family: 'Outfit';
            resize: none;
            height: 60px;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .send-btn {
            background: var(--accent-cyan);
            color: #000;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent-cyan);
        }

        /* Loading State */
        .typing-indicator {
            display: none;
            padding: 10px 20px;
            color: var(--accent-cyan);
            font-size: 0.8rem;
            font-family: 'Fira Code';
        }

        /* Back Button */
        .back-link {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--accent-cyan); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 280px;
                z-index: 2000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            .sidebar.active { transform: translateX(0); }
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                backdrop-filter: blur(4px);
                z-index: 1999;
            }
            .sidebar-overlay.active { display: block; }
            
            .chat-header { padding: 15px 20px; }
            .chat-messages { padding: 20px; gap: 20px; }
            .message { max-width: 95%; padding: 15px; }
            .input-container { padding: 15px 20px; }
            .input-wrapper { gap: 10px; }
            textarea { height: 50px; font-size: 14px; }
            .send-btn { width: 50px; height: 50px; }
            
            .mobile-header-actions {
                display: flex;
                align-items: center;
                gap: 15px;
            }
            .menu-toggle {
                display: block !important;
                background: transparent;
                border: 1px solid var(--border);
                color: var(--accent-cyan);
                padding: 8px;
                border-radius: 4px;
                cursor: pointer;
            }
        }

        .menu-toggle { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    
    <!-- Sidebar History -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span style="font-size: 1.2rem;">🤖</span> AGENT INTEL
            </div>
            <button class="new-chat-btn" onclick="startNewChat()">+ NEW ANALYSIS SESSION</button>
        </div>
        <div class="history-list" id="chatHistory">
            <!-- Sessions will be injected here -->
        </div>
    </div>

    <!-- Main Chat Window -->
    <div class="main-chat">
        <div class="chat-header">
            <div class="mobile-header-actions">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <div class="agent-status">
                    <div class="status-dot"></div>
                    <div>
                        <div class="agent-name">GEMINI-CORE v2.0</div>
                        <div style="font-size: 0.7rem; color: var(--text-dim);">SYSTEM: Specialist Mode</div>
                    </div>
                </div>
            </div>
            <a href="apkhunter.html" class="back-link">← HUB</a>
        </div>

        <div class="chat-messages" id="messageContainer">
            <!-- Welcome Message -->
            <div class="message agent">
                <strong>[SYSTEM INITIALIZED]</strong><br>
                Welcome back, Deepanshu. I am synced with your Gemini API key. I have full context of your recent Recon sessions. How can I assist with your offensive research today?
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">Analyzing data packets...</div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Command the AI (e.g., 'Analyze the Chagee login flow')..." onkeydown="handleKey(event)"></textarea>
                <button class="send-btn" onclick="sendMessage()">🚀</button>
            </div>
        </div>
    </div>

    <script>
        // --- AUTO-SYNC FROM LOCAL BRIDGE ---
        async function syncFromBridge() {
            try {
                const response = await fetch('http://localhost:9999/sync-keys');
                const keys = await response.json();
                if (keys.GEMINI_API_KEY) {
                    localStorage.setItem('GEMINI_API_KEY', keys.GEMINI_API_KEY);
                    localStorage.setItem('github_token', keys.GH_PAT);
                    addMessage('agent', "✅ <strong>[BRIDGE SYNC SUCCESS]</strong> Authenticated using local .env configuration.");
                    // Refresh current key in memory
                    API_KEY = keys.GEMINI_API_KEY;
                }
            } catch (err) {
                console.log("Local bridge not detected. Using stored credentials.");
            }
        }

        // Use the key from local storage or placeholder
        let API_KEY = localStorage.getItem('GEMINI_API_KEY') || '';
        let currentSessionId = Date.now().toString();
        let chatSessions = JSON.parse(localStorage.getItem('agent_chat_sessions') || '{}');

        // Initialize UI & Sync
        syncFromBridge();
        renderHistory();

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            // UI Update
            addMessage('user', text);
            input.value = '';
            document.getElementById('typingIndicator').style.display = 'block';

            // Store user msg
            saveMessage(currentSessionId, 'user', text);

            try {
                // 🛡️ SECURE TUNNEL: Calling your private Render backend
                // This replaces the direct Google call. Your key is now hidden on the server.
                const response = await fetch('/api/agent/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || `SERVER_ERROR_${response.status}`);
                }

                const data = await response.json();
                
                // Parse Gemini response through the proxy
                const aiResponse = data.candidates[0].content.parts[0].text;

                document.getElementById('typingIndicator').style.display = 'none';
                addMessage('agent', aiResponse);
                saveMessage(currentSessionId, 'agent', aiResponse);
                renderHistory();

            } catch (err) {
                document.getElementById('typingIndicator').style.display = 'none';
                addMessage('agent', `❌ SECURITY ERROR: ${err.message}<br><small style='opacity:0.5'>The server backend might not be active.</small>`);
                console.error("Backend Connection Error:", err);
            }
        }

        function addMessage(role, text) {
            const container = document.getElementById('messageContainer');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            // Basic Markdown Parsing (Bold and Code)
            const parsedText = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');

            div.innerHTML = parsedText;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function saveMessage(sessionId, role, text) {
            if (!chatSessions[sessionId]) {
                chatSessions[sessionId] = {
                    title: text.substring(0, 30) + '...',
                    messages: []
                };
            }
            chatSessions[sessionId].messages.push({ role, text });
            localStorage.setItem('agent_chat_sessions', JSON.stringify(chatSessions));
        }

        function renderHistory() {
            const list = document.getElementById('chatHistory');
            list.innerHTML = '';
            
            const sortedKeys = Object.keys(chatSessions).sort((a,b) => b - a);
            
            sortedKeys.forEach(id => {
                const item = document.createElement('div');
                item.className = `history-item ${id === currentSessionId ? 'active' : ''}`;
                item.innerText = chatSessions[id].title;
                item.onclick = () => loadSession(id);
                list.appendChild(item);
            });
        }

        function loadSession(id) {
            currentSessionId = id;
            const container = document.getElementById('messageContainer');
            container.innerHTML = '';
            
            if (chatSessions[id]) {
                chatSessions[id].messages.forEach(msg => {
                    addMessage(msg.role, msg.text);
                });
            }
            renderHistory();
        }

        function startNewChat() {
            currentSessionId = Date.now().toString();
            document.getElementById('messageContainer').innerHTML = `
                <div class="message agent">
                    <strong>[NEW SESSION INITIALIZED]</strong><br>
                    Ready for a new analysis. What target are we focusing on?
                </div>
            `;
            renderHistory();
        }
    </script>
</body>
</html>

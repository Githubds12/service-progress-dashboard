name: Automated Rotatory SMS Sync

on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync_messages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Cloud Rotatory Sync
        env:
          PULSE_EMAIL: ${{ secrets.PULSE_EMAIL }}
          PULSE_PASS: ${{ secrets.PULSE_PASS }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/cloud_rotatory_sync.py

      - name: Commit and Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dashboard/apkhunter_data.js dashboard/last_sync.json
          
          # Commit and push (always push last_sync.json)
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync: Automated SMS Intelligence Update [GitHub Actions]"
            git push origin main
          fi
